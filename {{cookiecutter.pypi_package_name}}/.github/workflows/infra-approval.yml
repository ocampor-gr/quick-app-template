{% raw %}
name: Infra Change Approval

on:
  workflow_call:

jobs:
  check-infra:
    name: Check for infra changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect infrastructure file changes
        id: check
        run: |
          if bash scripts/check-infra-changes.sh; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
          fi

  approve:
    name: Require infra approval
    needs: check-infra
    if: needs.check-infra.outputs.has_changes == 'true' && github.actor != 'ocampor-gr'
    runs-on: ubuntu-latest
    environment: infra
    steps:
      - run: echo "Infrastructure changes approved"
{% endraw %}
