name: Deploy to Elastic Beanstalk (Terraform)

on:
  push:
    branches:
      - {{cookiecutter.github_branch}}
  workflow_dispatch:

jobs:
  security-scan:
    name: Run Security Scan
    uses: ./.github/workflows/security-scan.yml
  backend-ci:
    name: Run Backend CI
    uses: ./.github/workflows/backend-ci.yml
  infra-approval:
    name: Infra Change Approval
    uses: ./.github/workflows/infra-approval.yml
  deploy:
    runs-on: ubuntu-latest
    needs: [security-scan, backend-ci, infra-approval]
    permissions:
      id-token: write
      contents: read
    {% raw %}
    if: ${{ always() && !failure() && !cancelled() }}
    {% endraw %}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        {% raw %}
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}
        {% endraw %}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.10"
    - name: Deploy via Terraform
      env:
        {% raw %}
        TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
        TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        TF_VAR_app_subnet_ids: ${{ vars.APP_SUBNET_IDS }}
        TF_VAR_elb_subnet_ids: ${{ vars.ELB_SUBNET_IDS }}
        TF_VAR_security_group_id: ${{ vars.SECURITY_GROUP_ID }}
        TF_VAR_google_client_id: ${{ vars.GOOGLE_CLIENT_ID }}
        TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        {% endraw %}
{% if cookiecutter.include_custom_domain == "yes" %}
        {% raw %}
        TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
        TF_VAR_subdomain: ${{ vars.SUBDOMAIN }}
        TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID }}
        TF_VAR_certificate_arn: ${{ vars.CERTIFICATE_ARN }}
        {% endraw %}
{% endif %}
      run: bash ./scripts/deploy.sh
  eb-logs:
    name: Print EB Logs
    needs: [deploy]
    {% raw %}
    if: failure()
    {% endraw %}
    uses: ./.github/workflows/eb-logs.yml
    secrets: inherit
