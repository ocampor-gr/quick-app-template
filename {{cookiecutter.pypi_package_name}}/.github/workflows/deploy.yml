name: Deploy to Elastic Beanstalk (Terraform)

on:
  push:
    branches:
      - {{cookiecutter.github_branch}}
  workflow_dispatch:

jobs:
  security-scan:
    name: Run Security Scan
    uses: ./.github/workflows/security-scan.yml
  backend-ci:
    name: Run Backend CI
    uses: ./.github/workflows/backend-ci.yml
  infra-approval:
    name: Infra Change Approval
    uses: ./.github/workflows/infra-approval.yml
  deploy:
    runs-on: ubuntu-latest
    needs: [security-scan, backend-ci, infra-approval]
    {% raw %}
    if: ${{ always() && !failure() && !cancelled() }}
    {% endraw %}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        {% raw %}
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        {% endraw %}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.10"
    - name: Deploy via Terraform
      env:
        {% raw %}
        TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
        TF_VAR_vpc_id: ${{ secrets.VPC_ID }}
        TF_VAR_app_subnet_ids: ${{ secrets.APP_SUBNET_IDS }}
        TF_VAR_elb_subnet_ids: ${{ secrets.ELB_SUBNET_IDS }}
        TF_VAR_security_group_id: ${{ secrets.SECURITY_GROUP_ID }}
        TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
        TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        {% endraw %}
{% if cookiecutter.include_custom_domain == "yes" %}
        {% raw %}
        TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
        TF_VAR_subdomain: ${{ secrets.SUBDOMAIN }}
        TF_VAR_hosted_zone_id: ${{ secrets.HOSTED_ZONE_ID }}
        TF_VAR_certificate_arn: ${{ secrets.CERTIFICATE_ARN }}
        {% endraw %}
{% endif %}
{% if cookiecutter.include_database == "yes" %}
        {% raw %}
        TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        {% endraw %}
{% endif %}
      run: bash ./scripts/deploy.sh
